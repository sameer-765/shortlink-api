services:
  postgres:
    image: postgres:16-alpine
    container_name: linkops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linkops"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linkops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: linkops-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: 3000
      DATABASE_URL: sqlite:////data/linkops.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: linkops-local-jwt-secret
      SERVICE_NAME: linkops-api
      API_KEY_A: linkops-local-key-a
      API_KEY_B: linkops-local-key-b
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3000:3000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - linkops_app_data:/data

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: linkops-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: 3000
      DATABASE_URL: sqlite:////data/linkops.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: linkops-local-jwt-secret
      SERVICE_NAME: linkops-worker
      API_KEY_A: linkops-local-key-a
      API_KEY_B: linkops-local-key-b
      CORS_ORIGIN: http://localhost:3000
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "-Q", "click-events"]
    volumes:
      - linkops_app_data:/data

volumes:
  linkops_app_data:
