name: API Auth Gate

on:
  pull_request:
    paths:
      - ".github/workflows/api-auth-gate.yml"
      - "apps/api/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/api-auth-gate.yml"
      - "apps/api/**"

jobs:
  auth-regression:
    runs-on: windows-latest
    env:
      APP_ENV: development
      PORT: "8000"
      DATABASE_URL: sqlite:///auth-gate.db
      JWT_SECRET: ci-test-secret-123
      SERVICE_NAME: api-test
      API_KEY_A: ci-test-key-a-123
      API_KEY_B: ci-test-key-b-123

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create repo virtual environment
        run: python -m venv .venv

      - name: Install API dependencies
        run: .\.venv\Scripts\python.exe -m pip install -r apps/api/requirements.txt

      - name: Run focused auth regression gate
        run: powershell -ExecutionPolicy Bypass -File .\apps\api\scripts\run_auth_ci.ps1
