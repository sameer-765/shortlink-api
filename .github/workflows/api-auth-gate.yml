name: API Auth Gate

on:
  pull_request:
    paths:
      - ".github/workflows/api-auth-gate.yml"
      - "apps/api/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/api-auth-gate.yml"
      - "apps/api/**"

jobs:
  auth-regression:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      PORT: "8000"
      DATABASE_URL: sqlite:////tmp/auth-gate.db
      JWT_SECRET: ci-test-secret-123
      SERVICE_NAME: api-test
      API_KEY_A: ci-test-key-a-123
      API_KEY_B: ci-test-key-b-123

    defaults:
      run:
        shell: bash
        working-directory: apps/api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: python -m pip install -r requirements.txt

      - name: Run focused auth regression gate
        run: python -m unittest -v tests.test_invitations tests.test_comments tests.test_audit_events
