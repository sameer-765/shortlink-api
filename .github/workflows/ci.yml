name: CI

permissions:
  contents: read
  packages: write
  
on:
  push:
  pull_request:
jobs:
  auth-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auth regression tests
        run: python -m unittest -v tests.test_invitations tests.test_comments tests.test_audit_events
  docker:
    runs-on: ubuntu-latest
    needs: auth-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_NAME: ghcr.io/sameer-765/api-test
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG ./apps/api

      - name: Smoke test container
        run: |
          docker run -d --name api-smoke \
            -p 8000:8000 \
            -e APP_ENV=production \
            -e PORT=8000 \
            -e DATABASE_URL=sqlite:////data/smoke.db \
            -e JWT_SECRET=ci-prod-secret-123 \
            -e SERVICE_NAME=api-service \
            -e API_KEY_A=ci-prod-key-a-123 \
            -e API_KEY_B=ci-prod-key-b-123 \
            $IMAGE_NAME:$IMAGE_TAG

          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ready || true)
            if [ "$status" = "200" ]; then
              break
            fi
            sleep 2
          done

          live_status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/live)
          [ "$live_status" = "200" ] || (echo "/live check failed" && exit 1)

          ready_status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ready)
          [ "$ready_status" = "200" ] || (echo "/ready check failed" && exit 1)

          metrics_status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/metrics)
          [ "$metrics_status" = "200" ] || (echo "/metrics check failed" && exit 1)

          create_response=$(curl -s -X POST http://127.0.0.1:8000/links \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ci-prod-key-a-123" \
            -d '{"long_url":"https://example.com/smoke"}')

          short_url=$(printf '%s' "$create_response" | python -c "import json,sys; print(json.load(sys.stdin)['short_url'])")
          redirect_status=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000${short_url}")
          [ "$redirect_status" = "302" ] || (echo "business smoke redirect failed" && exit 1)

      - name: Stop smoke test container
        if: always()
        run: docker rm -f api-smoke

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag latest alias
        run: docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Push image tags
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest
